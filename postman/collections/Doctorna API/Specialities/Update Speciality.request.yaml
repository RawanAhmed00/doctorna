$kind: http-request
name: PUT Update Speciality
method: PUT
url: '{{base_url}}/specialities/{{speciality_id}}'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Cardiology",
      "description": "Updated description for heart and cardiovascular system"
    }
