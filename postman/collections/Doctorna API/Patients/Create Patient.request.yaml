$kind: http-request
name: POST Create Patient
method: POST
url: '{{base_url}}/patients'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Sara Mohamed",
      "email": "sara@example.com",
      "password": "password123",
      "age": 25,
      "gender": "female",
      "phone": "01098765432",
      "role": "patient"
    }
