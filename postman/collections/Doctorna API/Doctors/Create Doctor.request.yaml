$kind: http-request
name: POST Create Doctor
method: POST
url: '{{base_url}}/doctors'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Dr. Ahmed Ali",
      "email": "dr.ahmed@example.com",
      "rank": "Senior",
      "gender": "male",
      "is_available": true,
      "spec_id": 1
    }
