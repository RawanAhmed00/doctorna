$kind: http-request
name: PATCH Doctor Availability
method: PATCH
url: '{{base_url}}/doctors/{{doctor_id}}/availability'
order: 6000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "is_available": false
    }
