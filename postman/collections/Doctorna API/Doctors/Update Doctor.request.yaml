$kind: http-request
name: PUT Update Doctor
method: PUT
url: '{{base_url}}/doctors/{{doctor_id}}'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Dr. Ahmed Ali",
      "email": "dr.ahmed@example.com",
      "rank": "Consultant",
      "gender": "male",
      "is_available": true,
      "spec_id": 1
    }
