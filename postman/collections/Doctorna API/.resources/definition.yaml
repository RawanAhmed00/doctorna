$kind: collection
name: Doctorna API
description: RESTful API collection for the Doctorna Clinic Management System.
variables:
  - key: base_url
    value: 'http://localhost:8000'
  - key: token
    value: ''
  - key: doctor_id
    value: '1'
  - key: patient_id
    value: '1'
  - key: appointment_id
    value: '1'
  - key: sub_service_id
    value: '1'
  - key: speciality_id
    value: '1'
