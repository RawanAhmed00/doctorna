$kind: http-request
name: POST Register
method: POST
url: '{{base_url}}/auth/register'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "email": "john@example.com",
      "password": "password123",
      "age": 30,
      "gender": "male",
      "phone": "01012345678",
      "role": "patient"
    }
