$kind: http-request
name: POST Login
method: POST
url: '{{base_url}}/auth/login'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "user@example.com",
      "password": "password123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      var res = pm.response.json();
      if (res.token) { pm.collectionVariables.set("token", res.token); }
