$kind: http-request
name: POST Reset Password
method: POST
url: '{{base_url}}/auth/reset-password'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "user@example.com",
      "token": "reset_token_here",
      "password": "newpassword123"
    }
