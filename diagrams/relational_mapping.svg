<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 850" width="100%" height="100%" style="background-color: #09090b; font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;">
    <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.6"/>
        </filter>
        
        <marker id="arrow-pink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 1 L 10 5 L 0 9 z" fill="#f472b6" /></marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 1 L 10 5 L 0 9 z" fill="#60a5fa" /></marker>
        <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 1 L 10 5 L 0 9 z" fill="#818cf8" /></marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 1 L 10 5 L 0 9 z" fill="#14b8a6" /></marker>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 1 L 10 5 L 0 9 z" fill="#f97316" /></marker>
    </defs>

    <!-- Solid Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#09090b" />

    <g transform="translate(-50, -50)">
        
        <!-- Dynamic Relationship Paths -->
        <g fill="none" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
            <!-- 1. appointments.user_id -> users.id (Blue) -->
            <path d="M 670,300 L 670,230 L 310,230 L 310,160" stroke="#60a5fa" marker-end="url(#arrow-blue)" />
            
            <!-- 2. appointments.doc_id -> doctor.id (Purple) -->
            <path d="M 790,350 L 790,430 L 310,430 L 310,490" stroke="#818cf8" marker-end="url(#arrow-purple)" />
            
            <!-- 3. doctor.spec_id -> speciality.id (Green) -->
            <path d="M 1030,550 L 1030,630 L 310,630 L 310,690" stroke="#14b8a6" marker-end="url(#arrow-green)" />
            
            <!-- 4. appointment_subservice.app_id -> appointments.id (Orange) Routed perfectly to point at id -->
            <path d="M 1510,550 L 1510,780 L 60,780 L 60,260 L 310,260 L 310,290" stroke="#f97316" marker-end="url(#arrow-orange)" />
            
            <!-- 5. appointment_subservice.ss_id -> sub_services.id (Pink) -->
            <path d="M 1630,500 L 1630,430 L 1210,430 L 1210,360" stroke="#f472b6" marker-end="url(#arrow-pink)" />
        </g>

        <!-- Connecting Node Dots -->
        <g fill="#27272a" stroke-width="2">
            <circle cx="670" cy="300" r="4.5" stroke="#60a5fa"/>
            <circle cx="790" cy="350" r="4.5" stroke="#818cf8"/>
            <circle cx="1030" cy="550" r="4.5" stroke="#14b8a6"/>
            <circle cx="1510" cy="550" r="4.5" stroke="#f97316"/>
            <circle cx="1630" cy="500" r="4.5" stroke="#f472b6"/>
        </g>

        <!-- TABLES -->
        <g font-size="15">
            <!-- 1. USERS (Row 1) -->
            <g transform="translate(100, 100)" filter="url(#shadow)">
                <rect x="0" y="0" width="1110" height="50" rx="8" fill="#18181b" stroke="#3f3f46" stroke-width="2" />
                <path d="M 8,0 L 150,0 L 150,50 L 8,50 Q 0,50 0,42 L 0,8 Q 0,0 8,0 Z" fill="#60a5fa" />
                <text x="75" y="25" fill="#09090b" font-weight="800" text-anchor="middle" dominant-baseline="central" font-size="16">users</text>
                <line x1="270" y1="0" x2="270" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="390" y1="0" x2="390" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="510" y1="0" x2="510" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="630" y1="0" x2="630" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="750" y1="0" x2="750" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="870" y1="0" x2="870" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="990" y1="0" x2="990" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <g fill="#a1a1aa" text-anchor="middle" dominant-baseline="central">
                    <text x="210" y="25" fill="#fafafa" font-weight="700">id</text>
                    <line x1="195" y1="38" x2="225" y2="38" stroke="#fafafa" stroke-width="2" />
                    <text x="330" y="25">name</text>
                    <text x="450" y="25">email</text>
                    <text x="570" y="25">password</text>
                    <text x="690" y="25">age</text>
                    <text x="810" y="25">gender</text>
                    <text x="930" y="25">phone</text>
                    <text x="1050" y="25">role</text>
                </g>
            </g>

            <!-- 2. APPOINTMENTS (Row 2) -->
            <g transform="translate(100, 300)" filter="url(#shadow)">
                <rect x="0" y="0" width="750" height="50" rx="8" fill="#18181b" stroke="#3f3f46" stroke-width="2" />
                <path d="M 8,0 L 150,0 L 150,50 L 8,50 Q 0,50 0,42 L 0,8 Q 0,0 8,0 Z" fill="#f97316" />
                <text x="75" y="25" fill="#09090b" font-weight="800" text-anchor="middle" dominant-baseline="central" font-size="16">appointments</text>
                <line x1="270" y1="0" x2="270" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="390" y1="0" x2="390" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="510" y1="0" x2="510" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="630" y1="0" x2="630" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <g fill="#a1a1aa" text-anchor="middle" dominant-baseline="central">
                    <text x="210" y="25" fill="#fafafa" font-weight="700">id</text>
                    <line x1="195" y1="38" x2="225" y2="38" stroke="#fafafa" stroke-width="2" />
                    <text x="330" y="25">status</text>
                    <text x="450" y="25">date_time</text>
                    <text x="570" y="25">user_id</text>
                    <line x1="540" y1="38" x2="600" y2="38" stroke="#a1a1aa" stroke-width="2" stroke-dasharray="4,4" />
                    <text x="690" y="25">doc_id</text>
                    <line x1="660" y1="38" x2="720" y2="38" stroke="#a1a1aa" stroke-width="2" stroke-dasharray="4,4" />
                </g>
            </g>

            <!-- 3. SUB_SERVICES (Row 2 Right) -->
            <g transform="translate(1000, 300)" filter="url(#shadow)">
                <rect x="0" y="0" width="630" height="50" rx="8" fill="#18181b" stroke="#3f3f46" stroke-width="2" />
                <path d="M 8,0 L 150,0 L 150,50 L 8,50 Q 0,50 0,42 L 0,8 Q 0,0 8,0 Z" fill="#f472b6" />
                <text x="75" y="25" fill="#09090b" font-weight="800" text-anchor="middle" dominant-baseline="central" font-size="16">sub_services</text>
                <line x1="270" y1="0" x2="270" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="390" y1="0" x2="390" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="510" y1="0" x2="510" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <g fill="#a1a1aa" text-anchor="middle" dominant-baseline="central">
                    <text x="210" y="25" fill="#fafafa" font-weight="700">id</text>
                    <line x1="195" y1="38" x2="225" y2="38" stroke="#fafafa" stroke-width="2" />
                    <text x="330" y="25">name</text>
                    <text x="450" y="25">fees</text>
                    <text x="570" y="25">description</text>
                </g>
            </g>

            <!-- 4. DOCTOR (Row 3) -->
            <g transform="translate(100, 500)" filter="url(#shadow)">
                <rect x="0" y="0" width="990" height="50" rx="8" fill="#18181b" stroke="#3f3f46" stroke-width="2" />
                <path d="M 8,0 L 150,0 L 150,50 L 8,50 Q 0,50 0,42 L 0,8 Q 0,0 8,0 Z" fill="#818cf8" />
                <text x="75" y="25" fill="#09090b" font-weight="800" text-anchor="middle" dominant-baseline="central" font-size="16">doctor</text>
                <line x1="270" y1="0" x2="270" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="390" y1="0" x2="390" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="510" y1="0" x2="510" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="630" y1="0" x2="630" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="750" y1="0" x2="750" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="870" y1="0" x2="870" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <g fill="#a1a1aa" text-anchor="middle" dominant-baseline="central">
                    <text x="210" y="25" fill="#fafafa" font-weight="700">id</text>
                    <line x1="195" y1="38" x2="225" y2="38" stroke="#fafafa" stroke-width="2" />
                    <text x="330" y="25">name</text>
                    <text x="450" y="25">email</text>
                    <text x="570" y="25">rank</text>
                    <text x="690" y="25">gender</text>
                    <text x="810" y="25">availability</text>
                    <text x="930" y="25">spec_id</text>
                    <line x1="895" y1="38" x2="965" y2="38" stroke="#a1a1aa" stroke-width="2" stroke-dasharray="4,4" />
                </g>
            </g>

            <!-- 5. APPOINTMENT_SUBSERVICE (Row 3 Right) -->
            <g transform="translate(1200, 500)" filter="url(#shadow)">
                <rect x="0" y="0" width="610" height="50" rx="8" fill="#18181b" stroke="#3f3f46" stroke-width="2" />
                <path d="M 8,0 L 250,0 L 250,50 L 8,50 Q 0,50 0,42 L 0,8 Q 0,0 8,0 Z" fill="#fbbf24" />
                <text x="125" y="25" fill="#09090b" font-weight="800" text-anchor="middle" dominant-baseline="central" font-size="15">appointment_subservice</text>
                <line x1="370" y1="0" x2="370" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="490" y1="0" x2="490" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <g fill="#a1a1aa" text-anchor="middle" dominant-baseline="central">
                    <text x="310" y="25">app_id</text>
                    <line x1="285" y1="38" x2="335" y2="38" stroke="#a1a1aa" stroke-width="2" stroke-dasharray="4,4" />
                    <text x="430" y="25">ss_id</text>
                    <line x1="410" y1="38" x2="450" y2="38" stroke="#a1a1aa" stroke-width="2" stroke-dasharray="4,4" />
                    <text x="550" y="25">prescription</text>
                </g>
            </g>

            <!-- 6. SPECIALITY (Row 4) -->
            <g transform="translate(100, 700)" filter="url(#shadow)">
                <rect x="0" y="0" width="510" height="50" rx="8" fill="#18181b" stroke="#3f3f46" stroke-width="2" />
                <path d="M 8,0 L 150,0 L 150,50 L 8,50 Q 0,50 0,42 L 0,8 Q 0,0 8,0 Z" fill="#14b8a6" />
                <text x="75" y="25" fill="#09090b" font-weight="800" text-anchor="middle" dominant-baseline="central" font-size="16">speciality</text>
                <line x1="270" y1="0" x2="270" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <line x1="390" y1="0" x2="390" y2="50" stroke="#3f3f46" stroke-width="2"/>
                <g fill="#a1a1aa" text-anchor="middle" dominant-baseline="central">
                    <text x="210" y="25" fill="#fafafa" font-weight="700">id</text>
                    <line x1="195" y1="38" x2="225" y2="38" stroke="#fafafa" stroke-width="2" />
                    <text x="330" y="25">name</text>
                    <text x="450" y="25">description</text>
                </g>
            </g>
        </g>
    </g>
</svg>
